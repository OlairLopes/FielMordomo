services:
  - type: web
    name: fielmordomo
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false --browser.gatherUsageStats=false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER_PERSISTENT_DISK
        value: "true"
    disk:
      name: dados-fielmordomo
      mountPath: /opt/render/project/src/dados
      sizeGB: 1